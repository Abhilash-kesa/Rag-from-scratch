<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .chat-app {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.06);
    }

    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e8e8e8;
      background: #fff;
    }

    header h1 {
      font-size: 1.125rem;
      font-weight: 600;
    }

    header p {
      font-size: 0.8125rem;
      color: #666;
      margin-top: 0.25rem;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message {
      display: flex;
      max-width: 85%;
    }

    .message.user {
      align-self: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .bubble {
      padding: 0.625rem 0.875rem;
      border-radius: 1rem;
      line-height: 1.5;
      font-size: 0.9375rem;
      word-wrap: break-word;
    }

    .message.user .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }

    .message.assistant .bubble {
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 0.25rem;
    }

    .message.assistant.error .bubble {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .thinking {
      color: #888;
      font-style: italic;
    }

    .sources {
      margin-top: 0.625rem;
      font-size: 0.8125rem;
    }

    .sources summary {
      cursor: pointer;
      color: #555;
      user-select: none;
    }

    .sources summary:hover {
      color: #2563eb;
    }

    .source-item {
      margin-top: 0.5rem;
      padding: 0.5rem 0.625rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 0.5rem;
    }

    .source-item .source-name {
      font-weight: 600;
      font-size: 0.75rem;
      color: #444;
      margin-bottom: 0.25rem;
    }

    .source-item .source-snippet {
      color: #666;
      font-size: 0.75rem;
      line-height: 1.4;
    }

    .input-area {
      display: flex;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      border-top: 1px solid #e8e8e8;
      background: #fff;
    }

    #question-input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      border: 1px solid #d0d0d0;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-family: inherit;
      outline: none;
    }

    #question-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    #send-btn {
      padding: 0.625rem 1.125rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    #send-btn:hover:not(:disabled) {
      background: #1d4ed8;
    }

    #send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-app">
    <header>
      <h1>RAG Chat</h1>
      <p>Ask a question about your uploaded documents</p>
    </header>

    <div id="messages"></div>

    <form class="input-area" id="chat-form">
      <input
        type="text"
        id="question-input"
        placeholder="Type your question..."
        autocomplete="off"
        required
      />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("question-input");
    const sendBtn = document.getElementById("send-btn");

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function createMessage(role, contentEl) {
      const msg = document.createElement("div");
      msg.className = "message " + role;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.appendChild(contentEl);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      scrollToBottom();
      return bubble;
    }

    function addUserMessage(text) {
      const el = document.createElement("span");
      el.textContent = text;
      createMessage("user", el);
    }

    function addThinkingPlaceholder() {
      const el = document.createElement("span");
      el.className = "thinking";
      el.textContent = "Thinking...";
      const bubble = createMessage("assistant", el);
      return bubble;
    }

    function buildSourcesHtml(citations) {
      if (!citations || citations.length === 0) return "";

      let items = citations.map(function (c) {
        return (
          '<div class="source-item">' +
            '<div class="source-name">' + escapeHtml(c.source || "Unknown source") + '</div>' +
            '<div class="source-snippet">' + escapeHtml(c.text_snippet || "") + '</div>' +
          '</div>'
        );
      }).join("");

      return (
        '<details class="sources">' +
          '<summary>Sources (' + citations.length + ')</summary>' +
          items +
        '</details>'
      );
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function setAssistantAnswer(bubble, answer, citations) {
      bubble.innerHTML = escapeHtml(answer) + buildSourcesHtml(citations);
      scrollToBottom();
    }

    function setAssistantError(bubble, message) {
      bubble.parentElement.parentElement.classList.add("error");
      bubble.textContent = message;
      scrollToBottom();
    }

    async function sendQuestion(question) {
      addUserMessage(question);
      input.value = "";
      input.disabled = true;
      sendBtn.disabled = true;

      const bubble = addThinkingPlaceholder();

      try {
        const res = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: question }),
        });

        if (!res.ok) {
          let errMsg = "Something went wrong. Please try again.";
          try {
            const errData = await res.json();
            if (res.status === 503) {
              errMsg = "The search index hasn't been built yet. Run `python scripts/ingest.py` first, then try again.";
            } else if (errData.detail) {
              errMsg = typeof errData.detail === "string"
                ? errData.detail
                : JSON.stringify(errData.detail);
            }
          } catch (_) {}
          setAssistantError(bubble, errMsg);
          return;
        }

        const data = await res.json();
        setAssistantAnswer(bubble, data.answer || "No answer returned.", data.citations);
      } catch (err) {
        setAssistantError(bubble, "Could not reach the server. Is uvicorn running?");
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const question = input.value.trim();
      if (question) sendQuestion(question);
    });

    input.focus();
  </script>
</body>
</html>
